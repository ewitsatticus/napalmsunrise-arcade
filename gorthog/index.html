<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>GORTHOG THE HUNGRY — Feed Me Your Email or I Die</title>
<meta name="description" content="An orc tamagotchi that craves your email. Feed Gorthog or watch him perish.">
<style>
  @import url('https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap');

  * { margin: 0; padding: 0; box-sizing: border-box; }

  :root {
    --orc-green: #4a7a2e;
    --orc-dark: #2d4a1c;
    --orc-light: #6b9e45;
    --blood-red: #8b0000;
    --bone-white: #e8dcc8;
    --bg-dark: #1a1a2e;
    --bg-darker: #0f0f1a;
    --gold: #c9a227;
    --health-green: #44ff44;
    --health-yellow: #ffcc00;
    --health-red: #ff3333;
  }

  body {
    background: var(--bg-dark);
    color: var(--bone-white);
    font-family: 'Press Start 2P', monospace;
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    overflow: hidden;
    position: relative;
  }

  #game-container {
    width: 420px;
    max-width: 95vw;
    position: relative;
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 16px;
  }

  /* === TITLE === */
  #title {
    font-size: 11px;
    color: var(--gold);
    text-align: center;
    text-shadow: 2px 2px 0 #000;
    letter-spacing: 2px;
    line-height: 1.6;
  }

  /* === HEALTH BAR === */
  #health-bar-container {
    width: 100%;
    background: #111;
    border: 3px solid #333;
    border-radius: 4px;
    padding: 3px;
    position: relative;
  }
  #health-bar-label {
    font-size: 8px;
    color: #999;
    margin-bottom: 4px;
    display: flex;
    justify-content: space-between;
  }
  #health-bar {
    height: 20px;
    background: var(--health-green);
    border-radius: 2px;
    transition: width 0.5s ease, background-color 0.5s ease;
    position: relative;
    width: 100%;
  }
  #health-bar.warning { background: var(--health-yellow); }
  #health-bar.danger { background: var(--health-red); animation: pulse-bar 0.5s infinite; }
  #health-bar.critical { background: var(--blood-red); animation: pulse-bar 0.25s infinite; }

  @keyframes pulse-bar {
    0%, 100% { opacity: 1; }
    50% { opacity: 0.5; }
  }

  /* === ORC VIEWPORT === */
  #orc-viewport {
    width: 280px;
    height: 280px;
    background: var(--bg-darker);
    border: 4px solid #333;
    border-radius: 12px;
    position: relative;
    overflow: hidden;
    image-rendering: pixelated;
  }

  /* === ORC SPRITE (CSS pixel art) === */
  #orc-sprite {
    position: absolute;
    bottom: 10px;
    left: 50%;
    transform: translateX(-50%);
    width: 160px;
    height: 200px;
    transition: filter 0.3s ease;
  }

  /* Orc built with layered divs */
  .orc-body {
    position: absolute;
    bottom: 0;
    left: 50%;
    transform: translateX(-50%);
    width: 100px;
    height: 120px;
    background: var(--orc-green);
    border-radius: 20px 20px 30px 30px;
    border: 3px solid var(--orc-dark);
  }
  .orc-head {
    position: absolute;
    bottom: 100px;
    left: 50%;
    transform: translateX(-50%);
    width: 110px;
    height: 100px;
    background: var(--orc-green);
    border-radius: 50% 50% 40% 40%;
    border: 3px solid var(--orc-dark);
    z-index: 2;
  }
  .orc-eye {
    position: absolute;
    top: 32px;
    width: 22px;
    height: 26px;
    background: #fff;
    border-radius: 50%;
    border: 2px solid var(--orc-dark);
    overflow: hidden;
  }
  .orc-eye.left { left: 20px; }
  .orc-eye.right { right: 20px; }
  .orc-pupil {
    position: absolute;
    top: 6px;
    left: 50%;
    transform: translateX(-50%);
    width: 10px;
    height: 12px;
    background: #1a1a1a;
    border-radius: 50%;
    transition: all 0.2s ease;
  }
  .orc-brow {
    position: absolute;
    top: 22px;
    width: 28px;
    height: 6px;
    background: var(--orc-dark);
    border-radius: 3px;
    transition: transform 0.3s ease;
  }
  .orc-brow.left { left: 16px; transform: rotate(-5deg); }
  .orc-brow.right { right: 16px; transform: rotate(5deg); }
  .orc-mouth {
    position: absolute;
    bottom: 18px;
    left: 50%;
    transform: translateX(-50%);
    width: 40px;
    height: 20px;
    background: #3a1a1a;
    border-radius: 0 0 20px 20px;
    border: 2px solid var(--orc-dark);
    border-top: none;
    overflow: hidden;
    transition: all 0.3s ease;
  }
  .orc-tusk {
    position: absolute;
    bottom: 34px;
    width: 10px;
    height: 16px;
    background: var(--bone-white);
    border-radius: 3px 3px 50% 50%;
    border: 1px solid #999;
    z-index: 3;
  }
  .orc-tusk.left { left: 26px; transform: rotate(5deg); }
  .orc-tusk.right { right: 26px; transform: rotate(-5deg); }
  .orc-ear {
    position: absolute;
    top: 25px;
    width: 30px;
    height: 20px;
    background: var(--orc-green);
    border: 2px solid var(--orc-dark);
    z-index: 1;
  }
  .orc-ear.left {
    left: -16px;
    border-radius: 50% 0 0 50%;
    transform: rotate(-15deg);
  }
  .orc-ear.right {
    right: -16px;
    border-radius: 0 50% 50% 0;
    transform: rotate(15deg);
  }

  /* Arms */
  .orc-arm {
    position: absolute;
    bottom: 30px;
    width: 28px;
    height: 70px;
    background: var(--orc-green);
    border: 3px solid var(--orc-dark);
    border-radius: 14px;
    z-index: 0;
  }
  .orc-arm.left { left: 6px; transform: rotate(10deg); }
  .orc-arm.right { right: 6px; transform: rotate(-10deg); }

  /* === ORC STATES === */
  #orc-sprite.idle .orc-mouth {
    height: 8px;
    border-radius: 4px;
    background: var(--orc-dark);
  }

  #orc-sprite.happy .orc-mouth {
    height: 24px;
    width: 50px;
    border-radius: 0 0 25px 25px;
    background: #3a1a1a;
  }
  #orc-sprite.happy .orc-eye {
    height: 8px;
    top: 38px;
  }
  #orc-sprite.happy .orc-brow.left { transform: rotate(-15deg) translateY(-3px); }
  #orc-sprite.happy .orc-brow.right { transform: rotate(15deg) translateY(-3px); }

  #orc-sprite.hungry .orc-mouth {
    width: 50px;
    height: 30px;
    border-radius: 50%;
    background: #3a1a1a;
    border: 2px solid var(--orc-dark);
    border-top: 2px solid var(--orc-dark);
  }
  #orc-sprite.hungry .orc-brow.left { transform: rotate(10deg) translateY(2px); }
  #orc-sprite.hungry .orc-brow.right { transform: rotate(-10deg) translateY(2px); }

  #orc-sprite.starving {
    animation: tremble 0.15s infinite;
  }
  #orc-sprite.starving .orc-mouth {
    width: 55px;
    height: 35px;
    border-radius: 50%;
    background: #2a0a0a;
  }
  #orc-sprite.starving .orc-brow.left { transform: rotate(20deg) translateY(5px); }
  #orc-sprite.starving .orc-brow.right { transform: rotate(-20deg) translateY(5px); }
  #orc-sprite.starving .orc-eye { background: #ffcccc; }

  #orc-sprite.dying {
    animation: death-throes 0.3s infinite;
    filter: saturate(0.5) brightness(0.7);
  }
  #orc-sprite.dying .orc-mouth {
    width: 60px;
    height: 40px;
    border-radius: 50%;
    background: #1a0505;
  }
  #orc-sprite.dying .orc-eye { background: #ff6666; }
  #orc-sprite.dying .orc-pupil { width: 4px; height: 4px; top: 10px; }
  #orc-sprite.dying .orc-brow.left { transform: rotate(25deg) translateY(8px); }
  #orc-sprite.dying .orc-brow.right { transform: rotate(-25deg) translateY(8px); }

  #orc-sprite.dead {
    filter: grayscale(1) brightness(0.4);
    transform: translateX(-50%) rotate(10deg);
    transition: all 2s ease;
  }
  #orc-sprite.dead .orc-eye { background: #666; }
  #orc-sprite.dead .orc-pupil {
    width: 18px;
    height: 2px;
    border-radius: 1px;
    top: 12px;
    background: #333;
  }
  #orc-sprite.dead .orc-pupil::after {
    content: '';
    position: absolute;
    width: 2px;
    height: 18px;
    background: #333;
    top: -8px;
    left: 8px;
  }
  #orc-sprite.dead .orc-mouth {
    width: 35px;
    height: 3px;
    border-radius: 0;
    bottom: 25px;
  }
  #orc-sprite.dead .orc-brow { display: none; }

  @keyframes tremble {
    0%, 100% { transform: translateX(-50%) translateY(0); }
    25% { transform: translateX(calc(-50% + 2px)) translateY(-1px); }
    75% { transform: translateX(calc(-50% - 2px)) translateY(1px); }
  }

  @keyframes death-throes {
    0% { transform: translateX(-50%) rotate(0deg); }
    25% { transform: translateX(calc(-50% + 4px)) rotate(2deg); }
    50% { transform: translateX(calc(-50% - 3px)) rotate(-1deg); }
    75% { transform: translateX(calc(-50% + 5px)) rotate(3deg); }
    100% { transform: translateX(-50%) rotate(0deg); }
  }

  /* Blood pool for death */
  #blood-pool {
    position: absolute;
    bottom: 5px;
    left: 50%;
    transform: translateX(-50%);
    width: 0;
    height: 0;
    background: radial-gradient(ellipse, var(--blood-red), #4a0000);
    border-radius: 50%;
    opacity: 0;
    transition: all 3s ease;
  }
  #blood-pool.active {
    width: 200px;
    height: 40px;
    opacity: 0.8;
  }

  /* Flies for dead state */
  .fly {
    position: absolute;
    width: 4px;
    height: 4px;
    background: #222;
    border-radius: 50%;
    display: none;
  }
  .fly.active {
    display: block;
    animation: fly-around 3s infinite ease-in-out;
  }
  .fly:nth-child(2) { animation-delay: -1s; animation-duration: 2.5s; }
  .fly:nth-child(3) { animation-delay: -2s; animation-duration: 3.5s; }

  @keyframes fly-around {
    0% { top: 40px; left: 100px; }
    25% { top: 30px; left: 160px; }
    50% { top: 50px; left: 140px; }
    75% { top: 25px; left: 110px; }
    100% { top: 40px; left: 100px; }
  }

  /* === CHAT BUBBLE === */
  #chat-bubble {
    background: #222;
    border: 3px solid #444;
    border-radius: 12px;
    padding: 14px 18px;
    font-size: 9px;
    line-height: 1.8;
    color: var(--bone-white);
    width: 100%;
    min-height: 60px;
    position: relative;
    text-align: center;
    transition: border-color 0.3s ease;
  }
  #chat-bubble::before {
    content: '';
    position: absolute;
    top: -12px;
    left: 50%;
    transform: translateX(-50%);
    border: 6px solid transparent;
    border-bottom-color: #444;
  }
  #chat-bubble::after {
    content: '';
    position: absolute;
    top: -8px;
    left: 50%;
    transform: translateX(-50%);
    border: 5px solid transparent;
    border-bottom-color: #222;
  }
  #chat-bubble.danger { border-color: var(--health-red); }
  #chat-bubble.critical {
    border-color: var(--blood-red);
    animation: pulse-border 0.5s infinite;
  }
  #chat-bubble.dead-bubble {
    border-color: #444;
    color: #666;
  }

  @keyframes pulse-border {
    0%, 100% { border-color: var(--blood-red); }
    50% { border-color: #ff0000; }
  }

  #chat-text {
    min-height: 1.8em;
  }

  /* Typing cursor */
  #chat-text::after {
    content: '█';
    animation: blink-cursor 0.6s infinite;
    color: var(--gold);
  }
  #chat-text.done::after { content: ''; }

  @keyframes blink-cursor {
    0%, 100% { opacity: 1; }
    50% { opacity: 0; }
  }

  /* === EMAIL INPUT === */
  #email-form {
    width: 100%;
    display: flex;
    gap: 8px;
  }
  #email-input {
    flex: 1;
    background: #111;
    border: 3px solid #333;
    border-radius: 6px;
    padding: 12px 14px;
    color: var(--bone-white);
    font-family: 'Press Start 2P', monospace;
    font-size: 9px;
    outline: none;
    transition: border-color 0.3s ease;
  }
  #email-input:focus { border-color: var(--gold); }
  #email-input::placeholder { color: #555; }
  #email-input:disabled {
    opacity: 0.4;
    cursor: not-allowed;
  }

  #feed-btn {
    background: var(--orc-green);
    border: 3px solid var(--orc-dark);
    border-radius: 6px;
    padding: 12px 18px;
    color: var(--bone-white);
    font-family: 'Press Start 2P', monospace;
    font-size: 9px;
    cursor: pointer;
    transition: all 0.2s ease;
    white-space: nowrap;
  }
  #feed-btn:hover:not(:disabled) {
    background: var(--orc-light);
    transform: translateY(-2px);
  }
  #feed-btn:active:not(:disabled) { transform: translateY(0); }
  #feed-btn:disabled {
    opacity: 0.4;
    cursor: not-allowed;
  }

  /* === RESTART BUTTON === */
  #restart-btn {
    display: none;
    background: var(--blood-red);
    border: 3px solid #550000;
    border-radius: 6px;
    padding: 12px 24px;
    color: var(--bone-white);
    font-family: 'Press Start 2P', monospace;
    font-size: 9px;
    cursor: pointer;
    transition: all 0.2s ease;
  }
  #restart-btn:hover {
    background: #aa0000;
    transform: translateY(-2px);
  }

  /* === STATUS LINE === */
  #status-line {
    font-size: 7px;
    color: #555;
    text-align: center;
    letter-spacing: 1px;
  }

  /* === EMAIL VALIDATION ERROR === */
  #email-error {
    font-size: 8px;
    color: var(--health-red);
    text-align: center;
    min-height: 1.2em;
  }

  /* === DEATH OVERLAY === */
  #death-overlay {
    position: fixed;
    inset: 0;
    background: rgba(0, 0, 0, 0);
    pointer-events: none;
    transition: background 5s ease;
    z-index: 100;
  }
  #death-overlay.active {
    background: rgba(20, 0, 0, 0.6);
  }

  /* === FED SUCCESS STATE === */
  .hearts {
    position: absolute;
    pointer-events: none;
  }
  .heart {
    position: absolute;
    font-size: 20px;
    animation: float-heart 2s ease-out forwards;
    opacity: 0;
  }
  @keyframes float-heart {
    0% { opacity: 1; transform: translateY(0) scale(0.5); }
    50% { opacity: 1; transform: translateY(-60px) scale(1.2); }
    100% { opacity: 0; transform: translateY(-120px) scale(0.8); }
  }

  /* === SCREEN SHAKE === */
  .screen-shake {
    animation: screen-shake 0.5s ease;
  }
  @keyframes screen-shake {
    0%, 100% { transform: translate(0); }
    10% { transform: translate(-8px, 4px); }
    20% { transform: translate(6px, -6px); }
    30% { transform: translate(-4px, 2px); }
    40% { transform: translate(4px, -4px); }
    50% { transform: translate(-2px, 6px); }
    60% { transform: translate(6px, -2px); }
    70% { transform: translate(-6px, 4px); }
    80% { transform: translate(2px, -6px); }
    90% { transform: translate(-4px, 2px); }
  }

  /* === VIGNETTE === */
  #vignette {
    position: fixed;
    inset: 0;
    pointer-events: none;
    box-shadow: inset 0 0 150px rgba(0,0,0,0.5);
    z-index: 50;
  }

  /* Red vignette for danger states */
  #vignette.danger {
    box-shadow: inset 0 0 150px rgba(139, 0, 0, 0.4);
  }
  #vignette.critical {
    box-shadow: inset 0 0 100px rgba(139, 0, 0, 0.7);
    animation: pulse-vignette 1s infinite;
  }
  @keyframes pulse-vignette {
    0%, 100% { box-shadow: inset 0 0 100px rgba(139, 0, 0, 0.7); }
    50% { box-shadow: inset 0 0 150px rgba(200, 0, 0, 0.9); }
  }

  /* === RESPONSIVE === */
  @media (max-width: 480px) {
    #game-container { gap: 12px; }
    #orc-viewport { width: 240px; height: 240px; }
    #orc-sprite { width: 130px; height: 170px; }
    .orc-body { width: 80px; height: 100px; }
    .orc-head { width: 90px; height: 80px; bottom: 82px; }
    #title { font-size: 9px; }
    #email-form { flex-direction: column; }
    #feed-btn { width: 100%; }
  }
</style>
</head>
<body>

<div style="position:fixed;top:12px;left:12px;z-index:200;display:flex;gap:12px;align-items:center;">
  <a href="/napalmsunrise-arcade/" style="font-family:'Press Start 2P',monospace;font-size:7px;color:#555;text-decoration:none;padding:6px 10px;border:1px solid #333;border-radius:4px;transition:all 0.2s;" onmouseover="this.style.color='#c9a227';this.style.borderColor='#c9a227'" onmouseout="this.style.color='#555';this.style.borderColor='#333'">&larr; HOME</a>
  <a href="/napalmsunrise-arcade/play/" style="font-family:'Press Start 2P',monospace;font-size:7px;color:#555;text-decoration:none;padding:6px 10px;border:1px solid #333;border-radius:4px;transition:all 0.2s;" onmouseover="this.style.color='#c9a227';this.style.borderColor='#c9a227'" onmouseout="this.style.color='#555';this.style.borderColor='#333'">PLAY</a>
</div>

<div id="vignette"></div>
<div id="death-overlay"></div>

<div id="game-container">
  <div id="title">
    ⚔ GORTHOG THE HUNGRY ⚔<br>
    <span style="font-size:7px;color:#888;">a tamagotchi of suffering</span>
  </div>

  <div id="health-bar-container">
    <div id="health-bar-label">
      <span>HUNGER</span>

      <div class="orc-ear right"></div>

  <div id="chat-bubble">
    <div id="chat-text"></div>

  <div id="email-error"></div>

  <form id="email-form" autocomplete="off">

    <button type="submit" id="feed-btn">FEED</button>

  <button id="restart-btn">RESURRECT GORTHOG</button>

  <div id="status-line">GORTHOG AWAITS YOUR OFFERING</div>
</div>

      "His wife Brunhilda will never know what happened.",
      "All he wanted was one email.",
      "You could have saved him.",
      "But you didn't.",
      "Are you happy now?",
    ],
    fed: [
      "YAAAAAAAGH!! EMAIL!! GORTHOG FEAST!!",
      "GLORIOUS!! GORTHOG BELLY FULL OF EMAIL!!",
      "YOU... YOU GREATEST HUMAN EVER LIVE!!",
      "Gorthog weep tears of joy!! BIG GREEN TEARS!!",
      "GORTHOG LIVE!! GORTHOG LIVE ANOTHER DAY!!",
      "*aggressive happy orc noises*",
      "Gorthog name firstborn after you!! (It ugly baby but is honor!!)",
      "EMAIL TASTE LIKE VICTORY AND SADNESS OF ENEMIES!!",
    ],
  };

  // ============================================================
  // STATE
  // ============================================================
  let state = {
    health: 100,
    phase: 'idle',        // idle | hungry | starving | dying | dead | fed
    lastTick: Date.now(),
    startTime: Date.now(),
    fed: false,
    email: null,
    dialogueIndex: {},
    currentTyping: null,
    paused: false,
  };

  // ============================================================
  // DOM REFS
  // ============================================================
  const $ = (sel) => document.querySelector(sel);
  const dom = {
    healthBar: $('#health-bar'),
    healthPercent: $('#health-percent'),
    orcSprite: $('#orc-sprite'),
    chatText: $('#chat-text'),
    chatBubble: $('#chat-bubble'),
    emailInput: $('#email-input'),
    emailForm: $('#email-form'),
    feedBtn: $('#feed-btn'),
    restartBtn: $('#restart-btn'),
    statusLine: $('#status-line'),
    bloodPool: $('#blood-pool'),
    vignette: $('#vignette'),
    deathOverlay: $('#death-overlay'),
    flies: [
      $('#fly1'), $('#fly2'), $('#fly3')
    ],
    emailError: $('#email-error'),
  };

  // ============================================================
  // SAVE / LOAD (localStorage)
  // ============================================================
  function saveState() {
    const data = {
      health: state.health,
      fed: state.fed,
      email: state.email,
      startTime: state.startTime,
      savedAt: Date.now(),
    };
    try {
      localStorage.setItem(CONFIG.SAVE_KEY, JSON.stringify(data));
    } catch(e) { /* localStorage unavailable, continue without save */ }
  }

  function loadState() {
    try {
      const raw = localStorage.getItem(CONFIG.SAVE_KEY);
      if (!raw) return false;
      const data = JSON.parse(raw);
      if (data.fed) {
        state.fed = true;
        state.email = data.email;
        state.health = 100;
        return true;
      }
      // Calculate health based on elapsed time since save
      const elapsed = (Date.now() - data.savedAt) / 1000;
      const healthLost = (elapsed / CONFIG.TOTAL_LIFE_SECONDS) * 100;
      state.health = Math.max(0, data.health - healthLost);
      state.startTime = data.startTime;
      return true;
    } catch(e) {
      return false;
    }
  }

  // ============================================================
  // EMAIL VALIDATION
  // ============================================================
  function validateEmail(email) {
    if (!email || !email.trim()) return 'GORTHOG NEED EMAIL, NOT EMPTY AIR';
    const trimmed = email.trim();
    // Basic regex - covers real-world emails
    const re = /^[^\s@]+@[^\s@]+\.[^\s@]{2,}$/;
    if (!re.test(trimmed)) return 'THAT NOT REAL EMAIL. GORTHOG NOT STUPID.';
    // Common typo detection
    const domain = trimmed.split('@')[1].toLowerCase();
    const suspicious = ['test.com', 'example.com', 'fake.com', 'asdf.com', 'aaa.com'];
    if (suspicious.includes(domain)) return 'GORTHOG KNOW FAKE EMAIL WHEN SEE ONE.';
    if (trimmed.length < 5) return 'TOO SHORT. GORTHOG SUSPICIOUS.';
    if (trimmed.length > 254) return 'THAT EMAIL LONGER THAN GORTHOG ARM.';
    return null;
  }

  // ============================================================
  // TYPEWRITER EFFECT
  // ============================================================
  function typeText(text, callback) {
    // Cancel any ongoing typing
    if (state.currentTyping) {
      clearTimeout(state.currentTyping);
      state.currentTyping = null;
    }

    dom.chatText.classList.remove('done');
    dom.chatText.textContent = '';
    let i = 0;

    function typeChar() {
      if (i < text.length) {
        dom.chatText.textContent += text[i];
        i++;
        state.currentTyping = setTimeout(typeChar, CONFIG.TYPING_SPEED_MS);
      } else {
        dom.chatText.classList.add('done');
        state.currentTyping = null;
        if (callback) callback();
      }
    }

    typeChar();
  }

  // ============================================================
  // PICK DIALOGUE
  // ============================================================
  function getDialogue(phase) {
    const lines = DIALOGUE[phase];
    if (!lines || lines.length === 0) return '...';

    if (!state.dialogueIndex[phase]) state.dialogueIndex[phase] = 0;

    // For dead state, go through lines sequentially
    if (phase === 'dead') {
      const idx = Math.min(state.dialogueIndex[phase], lines.length - 1);
      state.dialogueIndex[phase]++;
      return lines[idx];
    }

    // For other states, cycle through with some randomness
    const idx = state.dialogueIndex[phase] % lines.length;
    state.dialogueIndex[phase]++;
    return lines[idx];
  }

  // ============================================================
  // GET PHASE FROM HEALTH
  // ============================================================
  function getPhase(health) {
    if (state.fed) return 'fed';
    if (health <= 0) return 'dead';
    if (health <= 25) return 'dying';
    if (health <= 50) return 'starving';
    if (health <= 80) return 'hungry';
    return 'idle';
  }

  // ============================================================
  // UPDATE VISUALS
  // ============================================================
  let lastDialogueTime = 0;
  let lastPhase = null;

  function updateVisuals() {
    const phase = getPhase(state.health);
    const h = Math.max(0, Math.round(state.health));

    // Health bar
    dom.healthBar.style.width = h + '%';
    dom.healthPercent.textContent = h + '%';
    dom.healthBar.className = '';
    if (h <= 10) dom.healthBar.className = 'critical';
    else if (h <= 25) dom.healthBar.className = 'danger';
    else if (h <= 50) dom.healthBar.className = 'warning';

    // Orc sprite class
    const spriteClass = phase === 'fed' ? 'happy' : phase;
    dom.orcSprite.className = spriteClass;

    // Chat bubble styling
    dom.chatBubble.className = '';
    if (phase === 'dying') dom.chatBubble.classList.add('critical');
    else if (phase === 'starving') dom.chatBubble.classList.add('danger');
    else if (phase === 'dead') dom.chatBubble.classList.add('dead-bubble');

    // Vignette
    dom.vignette.className = '';
    if (phase === 'dying') dom.vignette.classList.add('critical');
    else if (phase === 'starving') dom.vignette.classList.add('danger');

    // Death state visuals
    if (phase === 'dead') {
      dom.bloodPool.classList.add('active');
      dom.flies.forEach(f => f.classList.add('active'));
      dom.deathOverlay.classList.add('active');
      dom.emailForm.style.display = 'none';
      dom.restartBtn.style.display = 'block';
      dom.emailInput.disabled = true;
      dom.feedBtn.disabled = true;
      dom.statusLine.textContent = 'GORTHOG IS DEAD. YOU KILLED HIM.';
    } else if (phase === 'fed') {
      dom.emailForm.style.display = 'none';
      dom.restartBtn.style.display = 'none';
      dom.statusLine.textContent = 'GORTHOG IS FED AND HAPPY. FOR NOW.';
    } else {
      dom.bloodPool.classList.remove('active');
      dom.flies.forEach(f => f.classList.remove('active'));
      dom.deathOverlay.classList.remove('active');
      dom.emailForm.style.display = 'flex';
      dom.restartBtn.style.display = 'none';
      dom.emailInput.disabled = false;
      dom.feedBtn.disabled = false;
    }

    // Update status line for alive states
    if (phase !== 'dead' && phase !== 'fed') {
      const statuses = {
        idle: 'GORTHOG AWAITS YOUR OFFERING',
        hungry: 'GORTHOG GROWS IMPATIENT',
        starving: 'GORTHOG IS SUFFERING',
        dying: 'GORTHOG IS DYING. FEED HIM NOW.',
      };
      dom.statusLine.textContent = statuses[phase] || '';
    }

    // New dialogue when phase changes or on interval
    const now = Date.now();
    const dialogueInterval = phase === 'dying' ? 3000 : phase === 'starving' ? 4000 : 6000;

    if (phase !== lastPhase) {
      // Phase changed — new dialogue immediately
      typeText(getDialogue(phase));
      lastDialogueTime = now;
      lastPhase = phase;

      // Screen shake on phase transitions (getting worse)
      if (['hungry', 'starving', 'dying', 'dead'].includes(phase) && !state.fed) {
        document.body.classList.add('screen-shake');
        setTimeout(() => document.body.classList.remove('screen-shake'), 500);
      }
    } else if (now - lastDialogueTime > dialogueInterval && !state.currentTyping) {
      typeText(getDialogue(phase));
      lastDialogueTime = now;
    }
  }

  // ============================================================
  // HEARTS ANIMATION
  // ============================================================
  function spawnHearts() {
    const viewport = $('#orc-viewport');
    for (let i = 0; i < 8; i++) {
      const heart = document.createElement('div');
      heart.classList.add('heart');
      heart.textContent = '💚';
      heart.style.left = (80 + Math.random() * 120) + 'px';
      heart.style.bottom = (80 + Math.random() * 60) + 'px';
      heart.style.animationDelay = (Math.random() * 1) + 's';
      viewport.appendChild(heart);
      setTimeout(() => heart.remove(), 2500);
    }
  }

  // ============================================================
  // FEED THE ORC
  // ============================================================
  function feedGorthog(email) {
    state.fed = true;
    state.email = email;
    state.health = 100;
    lastPhase = null;

    spawnHearts();

    // Screen shake of joy
    document.body.classList.add('screen-shake');
    setTimeout(() => document.body.classList.remove('screen-shake'), 500);

    typeText(getDialogue('fed'));
    updateVisuals();
    saveState();
  }

  // ============================================================
  // RESET
  // ============================================================
  function resetGorthog() {
    state = {
      health: 100,
      phase: 'idle',
      lastTick: Date.now(),
      startTime: Date.now(),
      fed: false,
      email: null,
      dialogueIndex: {},
      currentTyping: null,
      paused: false,
    };
    lastPhase = null;
    lastDialogueTime = 0;

    dom.bloodPool.classList.remove('active');
    dom.flies.forEach(f => f.classList.remove('active'));
    dom.deathOverlay.classList.remove('active');
    dom.emailInput.value = '';
    dom.emailError.textContent = '';

    try { localStorage.removeItem(CONFIG.SAVE_KEY); } catch(e) {}

    updateVisuals();
    typeText(getDialogue('idle'));
  }

  // ============================================================
  // GAME LOOP
  // ============================================================
  function gameLoop() {
    if (state.fed || state.health <= 0 || state.paused) {
      updateVisuals();
      requestAnimationFrame(gameLoop);
      return;
    }

    const now = Date.now();
    const dt = (now - state.lastTick) / 1000; // seconds
    state.lastTick = now;

    // Drain health
    const drainPerSecond = 100 / CONFIG.TOTAL_LIFE_SECONDS;
    state.health = Math.max(0, state.health - drainPerSecond * dt);

    // Save periodically (every ~2 seconds based on tick)
    if (Math.random() < dt * 0.5) saveState();

    updateVisuals();
    requestAnimationFrame(gameLoop);
  }

  // ============================================================
  // EYE TRACKING
  // ============================================================
  document.addEventListener('mousemove', (e) => {
    if (state.health <= 0 || state.fed) return;

    const viewport = $('#orc-viewport').getBoundingClientRect();
    const cx = viewport.left + viewport.width / 2;
    const cy = viewport.top + viewport.height * 0.35;

    const dx = (e.clientX - cx) / window.innerWidth;
    const dy = (e.clientY - cy) / window.innerHeight;

    const pupils = document.querySelectorAll('.orc-pupil');
    pupils.forEach(p => {
      p.style.left = `calc(50% + ${dx * 6}px)`;
      p.style.top = `${6 + dy * 6}px`;
    });
  });

  // ============================================================
  // EVENT HANDLERS
  // ============================================================
  dom.emailForm.addEventListener('submit', (e) => {
    e.preventDefault();
    const email = dom.emailInput.value;
    const error = validateEmail(email);

    if (error) {
      dom.emailError.textContent = error;
      // Shake the input
      dom.emailInput.style.borderColor = '#ff3333';
      setTimeout(() => { dom.emailInput.style.borderColor = ''; }, 1000);
      return;
    }

    dom.emailError.textContent = '';
    feedGorthog(email.trim());
  });

  // Clear error on input
  dom.emailInput.addEventListener('input', () => {
    dom.emailError.textContent = '';
  });

  dom.restartBtn.addEventListener('click', resetGorthog);

  // Pause when tab not visible (don't silently kill the orc)
  document.addEventListener('visibilitychange', () => {
    if (document.hidden) {
      state.paused = true;
      saveState();
    } else {
      state.paused = false;
      state.lastTick = Date.now();
    }
  });

  // ============================================================
  // INIT
  // ============================================================
  function init() {
    const loaded = loadState();
    if (!loaded) {
      state.startTime = Date.now();
    }
    state.lastTick = Date.now();

    // Initial dialogue
    const phase = getPhase(state.health);
    if (state.fed) {
      typeText("Gorthog remember you! You the good one! Gorthog still full of email!");
    } else if (phase === 'dead') {
      typeText(DIALOGUE.dead[0]);
    } else {
      typeText(getDialogue(phase));
    }

    lastDialogueTime = Date.now();
    requestAnimationFrame(gameLoop);
  }

  init();
})();
</script>
</body>
</html>
