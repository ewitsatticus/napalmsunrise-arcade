<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta name="theme-color" content="#0D0D0D">
  <title>Orc Parkour — Napalm Sunrise Arcade</title>
  <meta name="description" content="8-bit NES-style orc platformer. Run, jump, stomp enemies, and navigate the hub world.">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg: #F3EDE0;
      --black: #0D0D0D;
      --red: #E8260A;
      --acid: #C8FF00;
      --gray: #7A7468;
      --font-display: 'Bebas Neue', sans-serif;
      --font-ui: 'DM Mono', monospace;
    }
    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      background: var(--black);
      color: var(--bg);
      font-family: var(--font-ui);
      min-height: 100vh;
      display: flex;
      flex-direction: column;
    }

    /* Header bar */
    .play-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 10px 28px;
      border-bottom: 4px solid var(--red);
      flex-shrink: 0;
    }
    .play-header a {
      color: rgba(243,237,224,0.55);
      text-decoration: none;
      font-size: 10px;
      letter-spacing: 0.14em;
      text-transform: uppercase;
      transition: color 0.12s;
    }
    .play-header a:hover { color: var(--bg); }
    .play-logo {
      font-family: var(--font-display);
      font-size: 20px;
      letter-spacing: 0.1em;
      color: var(--bg);
      text-decoration: none !important;
    }
    .play-logo span { color: var(--red); }
    .play-title {
      font-family: var(--font-display);
      font-size: 16px;
      letter-spacing: 0.14em;
      color: var(--acid);
    }

    /* Game container */
    .game-wrap {
      flex: 1;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 12px;
      background: #080810;
    }
    .game-wrap iframe {
      width: 100%;
      max-width: 960px;
      aspect-ratio: 16 / 9;
      border: 3px solid #222;
      border-radius: 4px;
      image-rendering: pixelated;
    }

    /* Controls hint */
    .controls-bar {
      display: flex;
      justify-content: center;
      gap: 32px;
      padding: 10px 28px;
      border-top: 1px solid rgba(255,255,255,0.08);
      flex-shrink: 0;
    }
    .control-hint {
      font-size: 9px;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      color: rgba(243,237,224,0.3);
    }
    .control-hint kbd {
      display: inline-block;
      background: rgba(255,255,255,0.08);
      border: 1px solid rgba(255,255,255,0.15);
      border-radius: 3px;
      padding: 2px 6px;
      font-family: var(--font-ui);
      font-size: 9px;
      color: rgba(243,237,224,0.55);
      margin: 0 2px;
    }
  </style>
</head>
<body>
  <div class="play-header">
    <a href="/napalmsunrise-arcade/" class="play-logo">NAPALM<span>SUNRISE</span></a>
    <div class="play-title">ORC PARKOUR</div>
    <div style="display:flex;gap:16px;">
      <a href="/napalmsunrise-arcade/">Home</a>
      <a href="/napalmsunrise-arcade/gorthog/">Gorthog</a>
    </div>
  </div>

  <div class="game-wrap">
    <iframe
      src="https://ewitsatticus.github.io/parkour_game/"
      allowfullscreen
      loading="eager"
      title="Orc Parkour Game"
    ></iframe>
  </div>

  <div class="controls-bar">
    <div class="control-hint"><kbd>A</kbd> <kbd>D</kbd> or <kbd>&larr;</kbd> <kbd>&rarr;</kbd> Move</div>
    <div class="control-hint"><kbd>W</kbd> <kbd>Space</kbd> or <kbd>&uarr;</kbd> Jump</div>
    <div class="control-hint"><kbd>E</kbd> or <kbd>Enter</kbd> Interact</div>
    <div class="control-hint">Stomp enemies from above</div>
  </div>
</body>
</html>
